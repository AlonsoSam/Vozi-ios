name: VoziIOS
options:
  bundleIdPrefix: com.vozi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
# Rive (Fase 4B): runtime para skins animadas en "Mis recompensas". Primera
# dependencia externa del proyecto. Los .riv viven en Sources/Resources/Rive/.
packages:
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: "6.6.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    # Launch screen generado: sin esto iOS corre la app en modo compatibilidad
    # (letterbox) a resolución lógica menor, dejando la UI "chata" con espacio
    # arriba y abajo. Con esto la app usa la pantalla nativa completa.
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "VOZI usa el micrófono para apoyar la práctica de la pronunciación. El audio se procesa en el dispositivo; no se almacena ni se sube."
    INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "VOZI usa el reconocimiento de voz para apoyar la práctica de fonemas. Solo se guarda el texto aproximado y métricas, nunca el audio."
targets:
  VoziIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
        # .gitkeep solo mantiene las carpetas de audio (Fase 5) en git; no debe
        # empaquetarse como recurso. Los .mp3 sí se incluyen automáticamente.
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: RiveRuntime
        product: RiveRuntime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alonsosam.voziios
        TARGETED_DEVICE_FAMILY: "1"
