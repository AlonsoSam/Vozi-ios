name: VoziIOS
options:
  bundleIdPrefix: com.vozi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: "6.6.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "VOZI usa el micrófono para apoyar la práctica de la pronunciación. El audio se procesa en el dispositivo; no se almacena ni se sube."
    INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "VOZI usa el reconocimiento de voz para apoyar la práctica de fonemas. Solo se guarda el texto aproximado y métricas, nunca el audio."
    # Credenciales Supabase (Fase 7.1): el Info.plist base declara SUPABASE_URL y
    # SUPABASE_ANON_KEY con referencias $(...) que se resuelven desde
    # LocalSecrets.xcconfig (no versionado). Con GENERATE_INFOPLIST_FILE=YES, Xcode
    # fusiona las claves estándar (permisos, launch screen) sobre este base.
    INFOPLIST_FILE: Info.plist
targets:
  VoziIOS:
    type: application
    platform: iOS
    # Credenciales locales (gitignored). Debe existir vozi-ios/LocalSecrets.xcconfig.
    configFiles:
      Debug: LocalSecrets.xcconfig
      Release: LocalSecrets.xcconfig
    sources:
      - path: Sources
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: RiveRuntime
        product: RiveRuntime
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alonsosam.voziios
        TARGETED_DEVICE_FAMILY: "1"
